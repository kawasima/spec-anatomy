<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出張申請一覧 — スマホ版</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 0;
    color: #111827;
    width: 375px;
    margin: 0 auto;
    position: relative;
    min-height: 740px;
    padding-bottom: 80px;
  }
  .screen-title {
    background: #1f2937;
    color: #fff;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  .filter-toggle {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 12px 16px;
    font-size: 14px;
    color: #374151;
    cursor: pointer;
  }
  .card-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card-purpose {
    color: #2563eb;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
    text-decoration: none;
    display: block;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
  }
  .card-row .amount {
    font-variant-numeric: tabular-nums;
    color: #111827;
    font-weight: 600;
  }
  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-draft { background: #e5e7eb; color: #374151; }
  .status-submitted { background: #dbeafe; color: #1e40af; }
  .status-pre-required { background: #fef3c7; color: #92400e; }
  .status-pre-approved { background: #d1fae5; color: #065f46; }

  /* 操作領域(画面下部固定) */
  .actions-fixed {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 375px;
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  }
  .btn-fab {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="screen-title" data-group="ヘッダ・フィルタ領域">出張申請一覧</div>

  <div class="filter-toggle" data-item="フィルタ折りたたみ">▾ 検索フィルタ</div>

  <!-- 申請一覧領域(カード表示) -->
  <section data-group="申請一覧領域(スマホ)">
    <div class="card-list">
      <div class="card">
        <a class="card-purpose" data-item="出張目的" href="#">大阪支社での新サービス企画会議</a>
        <div class="card-row">
          <span data-item="状態"><span class="status-badge status-pre-required">事前承認必要</span></span>
          <span class="amount" data-item="予定費用合計">125,000 円</span>
        </div>
        <div class="card-row">
          <span data-item="出張期間">05/12 〜 05/14</span>
        </div>
      </div>

      <div class="card">
        <a class="card-purpose" href="#">福岡顧客訪問</a>
        <div class="card-row">
          <span><span class="status-badge status-pre-approved">事前承認OK</span></span>
          <span class="amount">68,000 円</span>
        </div>
        <div class="card-row">
          <span>04/25 〜 04/26</span>
        </div>
      </div>

      <div class="card">
        <a class="card-purpose" href="#">東京本社研修</a>
        <div class="card-row">
          <span><span class="status-badge status-submitted">申請済み</span></span>
          <span class="amount">42,000 円</span>
        </div>
        <div class="card-row">
          <span>05/01 〜 05/02</span>
        </div>
      </div>

      <div class="card">
        <a class="card-purpose" href="#">(下書き)</a>
        <div class="card-row">
          <span><span class="status-badge status-draft">ドラフト</span></span>
          <span class="amount">−</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 操作領域(画面下部固定) -->
  <div class="actions-fixed" data-group="操作領域(スマホ)">
    <button class="btn-fab" data-item="新規申請ボタン">+ 新規申請</button>
  </div>
</body>
</html>
