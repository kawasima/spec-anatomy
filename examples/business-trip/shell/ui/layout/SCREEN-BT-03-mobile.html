<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出張申請作成・編集 — スマホ版</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f3f4f6;
    margin: 0 auto;
    padding: 0;
    color: #111827;
    width: 375px;
    position: relative;
    min-height: 800px;
    padding-bottom: 90px;
  }
  .screen-title {
    background: #1f2937;
    color: #fff;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  .section {
    background: #fff;
    margin: 12px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
  }
  .section-heading {
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    margin: 0 0 10px;
  }

  .field {
    margin-bottom: 12px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: #374151;
    margin-bottom: 4px;
  }
  .field label .req { color: #dc2626; }
  .field input,
  .field select,
  .field textarea {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    box-sizing: border-box;
  }
  .field textarea {
    resize: vertical;
    min-height: 70px;
  }
  .radio-group {
    display: flex;
    gap: 16px;
    padding: 4px 0;
  }
  .radio-group label {
    font-size: 14px;
    margin: 0;
  }

  .traveler-list {
    list-style: none;
    margin: 0 0 8px;
    padding: 0;
  }
  .traveler-list li {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    background: #f9fafb;
    border-radius: 4px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .traveler-list .remove {
    color: #dc2626;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
  }

  /* 費用明細(アコーディオン) */
  .cost-card {
    background: #f9fafb;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .cost-card .field {
    margin-bottom: 8px;
  }
  .cost-card .field input,
  .cost-card .field select {
    padding: 6px 8px;
    font-size: 13px;
  }
  .cost-card .delete-row {
    color: #dc2626;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    float: right;
  }
  .total-row {
    text-align: right;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 0;
  }
  .btn-add {
    width: 100%;
    padding: 8px;
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  /* 操作領域 */
  .actions-fixed {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 375px;
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-secondary { background: #e5e7eb; color: #374151; }
</style>
</head>
<body>
  <div class="screen-title">出張申請作成・編集</div>

  <!-- 出張情報領域(スマホ) -->
  <section class="section" data-group="出張情報領域(スマホ)">
    <h2 class="section-heading">出張情報</h2>
    <div class="field">
      <label data-item="出張目的">出張目的<span class="req">*</span></label>
      <textarea placeholder="出張の目的を入力"></textarea>
    </div>
    <div class="field">
      <label data-item="出張開始日">出張開始日<span class="req">*</span></label>
      <input type="text" placeholder="2026/05/12">
    </div>
    <div class="field">
      <label data-item="出張終了日">出張終了日<span class="req">*</span></label>
      <input type="text" placeholder="2026/05/14">
    </div>
    <div class="field">
      <label data-item="費用負担区分">費用負担区分<span class="req">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="cb" checked> 自社負担</label>
        <label><input type="radio" name="cb"> 先方負担</label>
      </div>
    </div>
  </section>

  <!-- 出張者領域(スマホ) -->
  <section class="section" data-group="出張者領域(スマホ)">
    <h2 class="section-heading">出張者</h2>
    <ul class="traveler-list" data-item="出張者一覧">
      <li>
        <span>山田 太郎</span>
        <button class="remove">削除</button>
      </li>
    </ul>
    <button class="btn-add" data-item="出張者追加">+ 出張者を追加</button>
  </section>

  <!-- 予定費用明細領域(スマホ) - 1明細1カード -->
  <section class="section" data-group="予定費用明細領域(スマホ)">
    <h2 class="section-heading">予定費用明細</h2>

    <div class="cost-card">
      <button class="delete-row">削除</button>
      <div class="field">
        <label data-item="出張予定日付">日付<span class="req">*</span></label>
        <input type="text" placeholder="2026/05/12">
      </div>
      <div class="field">
        <label data-item="費目">費目<span class="req">*</span></label>
        <select>
          <option>交通費</option>
          <option>宿泊費</option>
          <option>交際費</option>
        </select>
      </div>
      <div class="field">
        <label data-item="予定金額">予定金額<span class="req">*</span></label>
        <input type="text" placeholder="28000">
      </div>
    </div>

    <div class="cost-card">
      <button class="delete-row">削除</button>
      <div class="field">
        <label>日付</label>
        <input type="text" placeholder="2026/05/12">
      </div>
      <div class="field">
        <label>費目</label>
        <select><option>宿泊費</option></select>
      </div>
      <div class="field">
        <label>予定金額</label>
        <input type="text" placeholder="22000">
      </div>
    </div>

    <div class="total-row" data-item="予定費用合計">予定費用合計: 50,000 円</div>
    <button class="btn-add" data-item="明細追加">+ 明細を追加</button>
  </section>

  <!-- 操作領域(スマホ) -->
  <div class="actions-fixed" data-group="操作領域(スマホ)">
    <button class="btn btn-secondary" data-item="下書き保存">下書き保存</button>
    <button class="btn btn-primary" data-item="申請する">申請する</button>
  </div>
</body>
</html>
