<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出張申請作成・編集</title>
<style>
  :root{
    --bg:#f3f4f6; --card:#fff; --ink:#111827; --ink2:#374151; --muted:#6b7280;
    --line:#e5e7eb; --line2:#d1d5db; --title:#1f2937;
    --primary:#2563eb; --primary-ink:#fff; --danger:#dc2626;
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg); margin:0; padding:24px; color:var(--ink);}
  .screen{max-width:1040px; margin:0 auto; background:var(--card); border-radius:8px;
    box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden;}
  .screen-title{background:var(--title); color:#fff; padding:14px 20px; font-size:18px; font-weight:600;
    display:flex; justify-content:space-between; align-items:center; gap:12px;}
  .section{padding:20px; border-bottom:1px solid var(--line);}
  .section:last-child{border-bottom:none;}
  .section-heading{font-size:14px; font-weight:600; color:var(--ink2); margin:0 0 14px;
    padding-bottom:8px; border-bottom:2px solid var(--line2);}
  .form-grid{display:grid; grid-template-columns:150px 1fr; gap:14px 16px; align-items:start;}
  .form-grid label{padding:6px 0; font-size:13px; color:var(--ink2);}
  .form-grid label .req{color:var(--danger); margin-left:3px;}
  .form-grid input[type=text],.form-grid select,.form-grid textarea{padding:8px 10px;
    border:1px solid var(--line2); border-radius:4px; font-size:14px; font-family:inherit; width:100%;}
  .form-grid textarea{resize:vertical; min-height:80px;}
  .radio-group{display:flex; gap:16px; padding:6px 0; font-size:14px;}
  table.detail{width:100%; border-collapse:collapse; font-size:14px;}
  table.detail th,table.detail td{border:1px solid var(--line); padding:6px 8px; text-align:left;}
  table.detail th{background:#f9fafb; font-weight:600; color:var(--ink2); font-size:13px;}
  table.detail input,table.detail select{padding:4px 6px; border:1px solid var(--line2);
    border-radius:3px; font-size:13px; font-family:inherit; width:100%;}
  table.detail td.amount,table.detail th.amount{text-align:right; font-variant-numeric:tabular-nums;}
  table.detail tfoot td{background:#f9fafb; font-weight:600; text-align:right;}
  .traveler-list{list-style:none; margin:0 0 8px; padding:0;}
  .traveler-list li{display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; background:#f9fafb; border-radius:4px; margin-bottom:6px; font-size:14px;}
  .banner{padding:12px 16px; border-radius:6px; font-size:14px; margin-bottom:16px;}
  .banner-warn{background:#fffbeb; color:#92400e; border:1px solid #fde68a;}
  .btn{padding:10px 20px; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer;}
  .btn-primary{background:var(--primary); color:var(--primary-ink);}
  .btn-secondary{background:#e5e7eb; color:#374151;}
  .btn-tertiary{background:#fff; color:#374151; border:1px solid var(--line2);}
  .btn-danger{background:#fff; color:var(--danger); border:1px solid #fca5a5;}
  .btn-add{padding:6px 14px; background:#f3f4f6; color:#374151; border:1px solid var(--line2);
    border-radius:4px; font-size:13px; cursor:pointer;}
  .btn-mini{background:none; border:none; color:var(--danger); cursor:pointer; font-size:13px;}
  .actions{display:flex; justify-content:flex-end; gap:12px; flex-wrap:wrap; align-items:center;}
  .actions .spacer{margin-right:auto;}
  .hint{font-size:12px; color:var(--muted); margin-top:4px;}
  @media (max-width:640px){
    body{padding:12px;}
    .form-grid{grid-template-columns:1fr; gap:6px;}
    .form-grid label{padding:0;}
    .table-scroll{overflow-x:auto;}
    table.detail{min-width:560px;}
    .actions{justify-content:stretch;}
    .actions .btn{flex:1;}
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="screen-title"><span>出張申請作成・編集</span></div>

    <!-- 差し戻し通知（差し戻し編集時に表示） -->
    <section class="section" data-group="通知領域">
      <div class="banner banner-warn" data-item="差し戻し理由">
        事前承認が却下されました: 予定費用の妥当性を再確認し、修正のうえ再申請してください。
      </div>
    </section>

    <!-- 出張情報領域 -->
    <section class="section" data-group="出張情報領域">
      <h2 class="section-heading">出張情報</h2>
      <div class="form-grid">
        <label data-item="出張目的">出張目的<span class="req">*</span></label>
        <textarea placeholder="出張の目的を入力(1〜500文字)">大阪支社での新サービス企画会議に出席するため</textarea>

        <label data-item="出張開始日">出張開始日<span class="req">*</span></label>
        <input type="text" value="2026/05/12">

        <label data-item="出張終了日">出張終了日<span class="req">*</span></label>
        <input type="text" value="2026/05/14">

        <label data-item="費用負担区分">費用負担区分<span class="req">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="cost-bearing" checked> 自社負担</label>
          <label><input type="radio" name="cost-bearing"> 先方負担</label>
        </div>
      </div>
    </section>

    <!-- 出張者領域 -->
    <section class="section" data-group="出張者領域">
      <h2 class="section-heading">出張者</h2>
      <ul class="traveler-list" data-item="出張者一覧">
        <li><span>山田 太郎(EMP-000123)</span><button class="btn-mini">削除</button></li>
        <li><span>佐藤 花子(EMP-000188)</span><button class="btn-mini">削除</button></li>
      </ul>
      <button class="btn-add" data-item="出張者を追加">+ 出張者を追加</button>
    </section>

    <!-- 予定費用明細領域 -->
    <section class="section" data-group="予定費用明細領域">
      <h2 class="section-heading">予定費用明細</h2>
      <div class="table-scroll">
        <table class="detail">
          <thead>
            <tr>
              <th data-item="出張予定日付">出張予定日付<span class="req">*</span></th>
              <th data-item="費目">費目<span class="req">*</span></th>
              <th class="amount" data-item="予定金額">予定金額<span class="req">*</span></th>
              <th data-item="明細削除"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="text" value="2026/05/12"></td>
              <td><select><option>交通費</option><option>宿泊費</option><option>交際費</option></select></td>
              <td class="amount"><input type="text" value="28000" style="text-align:right;"></td>
              <td><button class="btn-mini">削除</button></td>
            </tr>
            <tr>
              <td><input type="text" value="2026/05/12"></td>
              <td><select><option>宿泊費</option><option>交通費</option><option>交際費</option></select></td>
              <td class="amount"><input type="text" value="22000" style="text-align:right;"></td>
              <td><button class="btn-mini">削除</button></td>
            </tr>
          </tbody>
          <tfoot>
            <tr><td colspan="2">予定費用合計</td><td class="amount" data-item="予定費用合計">50,000 円</td><td></td></tr>
          </tfoot>
        </table>
      </div>
      <div style="margin-top:10px;"><button class="btn-add" data-item="明細を追加">+ 明細を追加</button></div>
    </section>

    <!-- 操作領域 -->
    <section class="section" data-group="操作領域">
      <div class="actions">
        <button class="btn btn-danger spacer" data-item="破棄">破棄</button>
        <button class="btn btn-tertiary" data-item="キャンセル">キャンセル</button>
        <button class="btn btn-secondary" data-item="下書き保存">下書き保存</button>
        <button class="btn btn-secondary" data-item="再申請">再申請</button>
        <button class="btn btn-primary" data-item="申請提出">申請する</button>
      </div>
      <p class="hint">「破棄」は下書きのみ、「再申請」は差し戻された申請の編集時のみ有効です。</p>
    </section>
  </div>
</body>
</html>
