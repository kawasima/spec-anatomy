spring.application.name=token-billing-shell

# Default to a local Postgres instance; override per environment.
spring.datasource.url=jdbc:postgresql://localhost:5432/token_billing
spring.datasource.username=token_billing
spring.datasource.password=token_billing

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Treat the request body as Jackson JsonNode — Raoh decodes from there.
spring.mvc.servlet.path=/
