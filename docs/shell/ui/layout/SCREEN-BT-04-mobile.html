<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出張実績登録 — スマホ版</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f3f4f6;
    margin: 0 auto;
    padding: 0;
    color: #111827;
    width: 375px;
    position: relative;
    min-height: 800px;
    padding-bottom: 90px;
  }
  .screen-title {
    background: #1f2937;
    color: #fff;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  .section {
    background: #fff;
    margin: 12px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
  }
  .section.readonly { background: #f9fafb; }
  .section-heading {
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    margin: 0 0 10px;
  }

  .info-list {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .info-list li {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px dashed #e5e7eb;
  }
  .info-list li:last-child { border-bottom: none; }
  .info-list .label-text {
    color: #6b7280;
    font-size: 13px;
  }
  .info-list .value-text {
    color: #111827;
    font-weight: 500;
  }

  .field {
    margin-bottom: 10px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: #374151;
    margin-bottom: 4px;
  }
  .field label .req { color: #dc2626; }
  .field input,
  .field select {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    box-sizing: border-box;
  }

  .cost-card {
    background: #f9fafb;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .cost-card .delete-row {
    color: #dc2626;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    float: right;
  }
  .total-row {
    text-align: right;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 0;
  }
  .btn-add {
    width: 100%;
    padding: 8px;
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  .actions-fixed {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 375px;
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-secondary { background: #e5e7eb; color: #374151; }
</style>
</head>
<body>
  <div class="screen-title">出張実績登録</div>

  <!-- 申請情報(参照)領域(スマホ) -->
  <section class="section readonly" data-group="申請情報(参照)領域(スマホ)">
    <h2 class="section-heading">申請情報 (参照)</h2>
    <ul class="info-list">
      <li>
        <span class="label-text">出張目的</span>
        <span class="value-text" data-item="出張目的">福岡顧客訪問</span>
      </li>
      <li>
        <span class="label-text">出張期間</span>
        <span class="value-text" data-item="出張期間">04/25 〜 04/26</span>
      </li>
      <li>
        <span class="label-text">予定費用合計</span>
        <span class="value-text" data-item="予定費用合計">68,000 円</span>
      </li>
    </ul>
  </section>

  <!-- 実績費用明細領域(スマホ) -->
  <section class="section" data-group="実績費用明細領域(スマホ)">
    <h2 class="section-heading">実績費用明細</h2>

    <div class="cost-card">
      <button class="delete-row">削除</button>
      <div class="field">
        <label data-item="出張実績日付">日付<span class="req">*</span></label>
        <input type="text" placeholder="2026/04/25">
      </div>
      <div class="field">
        <label data-item="費目">費目<span class="req">*</span></label>
        <select>
          <option>交通費</option>
          <option>宿泊費</option>
          <option>交際費</option>
        </select>
      </div>
      <div class="field">
        <label data-item="実績金額">実績金額<span class="req">*</span></label>
        <input type="text" placeholder="29500">
      </div>
    </div>

    <div class="cost-card">
      <button class="delete-row">削除</button>
      <div class="field">
        <label>日付</label>
        <input type="text" placeholder="2026/04/25">
      </div>
      <div class="field">
        <label>費目</label>
        <select><option>宿泊費</option></select>
      </div>
      <div class="field">
        <label>実績金額</label>
        <input type="text" placeholder="20000">
      </div>
    </div>

    <div class="total-row" data-item="実績費用合計">実績費用合計: 49,500 円</div>
    <button class="btn-add" data-item="明細追加">+ 明細を追加</button>
  </section>

  <!-- 操作領域(スマホ) -->
  <div class="actions-fixed" data-group="操作領域(スマホ)">
    <button class="btn btn-secondary" data-item="戻るボタン">戻る</button>
    <button class="btn btn-primary" data-item="登録ボタン">実績を登録</button>
  </div>
</body>
</html>
